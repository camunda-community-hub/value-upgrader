# helm uninstall camunda -n camunda; kubectl delete -n camunda pvc -l app.kubernetes.io/instance=camunda;kubectl delete namespace camunda

global:
  identity:
    auth:
      enabled: false
  license:
    key: >
      --------------- BEGIN CAMUNDA LICENSE KEY ---------------
      Mykey;
      customer = testaccount_camunda;
      expiryDate = unlimited;
      licenseType = production;
      startDate = 2024-10-11;
      ---------------  END CAMUNDA LICENSE KEY  ---------------

identity:
  enabled: false
  postgresql:
    enabled: false

identityKeycloak:
  enabled: false

webModeler:
  enabled: false
  restapi:
    mail:
      fromAddress: "pierre-yves.monnet@camunda.com"

operate:
  enabled: true

tasklist:
  enabled: true

optimize:
  enabled: true

connectors:
  enabled: true
  env:
    - name: CAMUNDA_CONNECTOR_POLLING_ENABLED
      value: "false"
    - name: CAMUNDA_CONNECTOR_WEBHOOK_ENABLED
      value: "false"
    - name: OPERATE_CLIENT_ENABLED
      value: "false"


zeebe:
  clusterSize: 3
  partitionCount: 6
  replicationFactor: 3
  resources:
    requests:
    limits:



zeebe-gateway:
  replicas: 2
  env:
    - name: CAMUNDA_REST_QUERY_ENABLED
      value: "true"


prometheusServiceMonitor:
  enabled: true



