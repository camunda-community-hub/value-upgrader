apiVersion: apps/v1
kind: Deployment
metadata:
  name: upgrader-value
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upgrader-value
  template:
    metadata:
      labels:
        app: upgrader-value
    spec:
      containers:
        - name: upgrader-value-container
          image: ghcr.io/camunda-community-hub/value-upgrader:latest
          ports:
            - containerPort: 8383

---
apiVersion: v1
kind: Service
metadata:
  name: upgrader-value-service
spec:
  selector:
    app: upgrader-value
  ports:
    - protocol: TCP
      port: 8383
      targetPort: 8383
  type: ClusterIP
